<section class="contact" id="contact">
  <div class="container contact-container">
    <!-- TEXTO -->
    <div class="contact-content">
      <span>Solicite um orçamento</span>

      <h2>Faça seu orçamento online</h2>

      <p>
        Informe os detalhes do serviço e nossa equipe retornará rapidamente.
      </p>

      <div class="price-box">
        <h3>Instalações a partir de R$ 320</h3>

        <p>
          Orçamentos personalizados com atendimento rápido e avaliação técnica
          especializada.
        </p>

        <span> *Valores sujeitos à análise do ambiente e infraestrutura. </span>
      </div>
    </div>

    <!-- FORM -->
    <form class="contact-form" id="budget-form">
      <div class="input-group">
        <input type="text" id="name" placeholder="Seu nome" required />
      </div>

      <div class="input-group">
        <input
          type="tel"
          id="phone"
          placeholder="Telefone / WhatsApp"
          required
        />
      </div>

      <div class="input-group">
        <input type="email" id="email" placeholder="Seu e-mail" required />
      </div>

      <div class="input-group">
        <select id="service" required>
          <option value="">Tipo de serviço</option>

          <option value="Instalação">Instalação</option>

          <option value="Manutenção">Manutenção</option>

          <option value="Higienização">Higienização</option>

          <option value="Infraestrutura">Infraestrutura</option>
        </select>
      </div>

      <div class="input-group">
        <input
          type="number"
          id="quantity"
          placeholder="Quantidade de aparelhos"
          required
        />
      </div>

      <div class="input-group">
        <input type="text" id="location" placeholder="Cidade / Bairro" />
      </div>

      <div class="input-group">
        <textarea id="message" rows="5" placeholder="Descreva o serviço">
        </textarea>
      </div>

      <button type="submit" class="btn-primary">Solicitar orçamento</button>
    </form>
  </div>

  <!-- MAPA FULL WIDTH -->
  <div class="map-section">
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3656.1234567890123!2d-46.633308!3d-23.55052!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94ce59c123456789%3A0xabcdef1234567890!2sSua%20Empresa%20de%20Ar%20Condicionado!5e0!3m2!1spt-BR!2sbr!4v1700000000000"
      width="100%"
      height="450"
      style="border: 0"
      allowfullscreen=""
      loading="lazy"
    >
    </iframe>
  </div>
</section>
